name: Migrate Production DB

on:
  push:
    branches: [main]
    paths:
      - "drizzle/**"
      - "src/db/schema.ts"
      - "drizzle.config.ts"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run migrations
        run: npx drizzle-kit migrate
        env:
          ARTICLES_SERVICE_DATABASE_URL: ${{ secrets.ARTICLES_SERVICE_DATABASE_URL }}
